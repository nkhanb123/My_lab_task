<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Application name</th>
                <th>Technology stack</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{
                    app.name}}</td>
                    <td>
                        {{ app.tech_stack}}
                    </td>
                    <td>
                        <span class =" badge {% if app . is_active %} bg - success {%
else %} bg - danger {% endif %}" >
 {{ app . status }}
 </ span >
                    </td>
            </tr>
             {% empty %}
             <tr >
 <td colspan ="3" > No active system application records found .
</td >
 </tr >
 {% endfor %}

        </tbody>
    </table>
</body>
</html>
