<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial;
  background-color: #fff3e6;
  margin: 20px;
}

h1 {
  text-align: center;
  color: darkred;
}

h2 {
  color: green;
}

ul, ol {
  background-color: white;
  padding: 20px;
  border-radius: 10px;
}

table {
  width: 50%;
  background-color: white;
  border-collapse: collapse;
}

th {
  background-color: orange;
  color: white;
}

th, td {
  border: 1px solid black;
  padding: 10px;
  text-align: center;
}


</style>
</head>

<body>

<h1>Pizza Recipe</h1>

<h2>Ingredients</h2>
<ul>
  <li>Flour</li>
  <li>Cheese</li>
  <li>Tomato Sauce</li>
  <li>Vegetables</li>
</ul>

<h2>Steps</h2>
<ol>
  <li>Make the dough</li>
  <li>Add sauce and cheese</li>
  <li>Bake the pizza</li>
</ol>

<h2>Nutrition Facts</h2>
<table>
  <tr>
    <th>Nutrient</th>
    <th>Amount</th>
  </tr>
  <tr>
    <td>Calories</td>
    <td>300 kcal</td>
  </tr>
  <tr>
    <td>Protein</td>
    <td>10 g</td>
  </tr>
</table>

</html>
